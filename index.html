<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Montserrat', sans-serif; background-color: #000; color: white; overflow: hidden; }

        /* FONDO */
        .background-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(212, 63, 141, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                        url('fondo.png') no-repeat center center fixed;
            background-size: cover; z-index: -1;
        }

        /* BARRA SUPERIOR */
        header {
            position: fixed; top: 0; width: 100%; height: 85px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
        }

        .nav-left { display: flex; list-style: none; }
        .nav-left li { margin-right: 20px; }
        .nav-left a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

        /* REPRODUCTOR DERECHA */
        .player-right { display: flex; align-items: center; gap: 15px; }
        .live-tag { color: #ff3e3e; font-size: 9px; font-weight: 900; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Estilo para que el widget no se rompa */
        .cstrEmbed { min-width: 180px; text-align: right; }
        /* Los links ahora son visibles pero diminutos y grises al final */
        .cstrEmbed a { font-size: 9px !important; color: rgba(255,255,255,0.2) !important; text-decoration: none !important; margin-left: 5px; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .main-logo { max-width: 350px; width: 80%; filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.8)); }

        @media (max-width: 768px) {
            header { padding: 0 15px; }
            .nav-left { display: none; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <div class="nav-left">
            <ul class="nav-left">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>

        <div class="player-right">
            <span class="live-tag">ON AIR</span>
            
            <div class="cstrEmbed" 
                 data-type="newStreamPlayer" 
                 data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" 
                 data-theme="dark" 
                 data-color="FFAA00" 
                 data-rendered="false">
                 
                 <a href="https://www.caster.fm">Radio Hosting</a>
                 <a href="https://www.caster.fm">Shoutcast</a>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
