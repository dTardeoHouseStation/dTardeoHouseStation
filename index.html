<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeoHouseStation | En Directo</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #00ffcc; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { opacity: 0.7; margin-bottom: 30px; }
        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Estilo moderno para el reproductor */
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #ff3e3e;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">LIVE • ON AIR</div>
        <h1>Tardeo House</h1>
        <p>Sintoniza el mejor sonido House desde tu Android.</p>
        
        <audio controls autoplay>
            <source src="https://dtardeohousestation.ismyradio.com/stream" type="audio/mpeg">
            Tu navegador no soporta el reproductor.
        </audio>
        
        <div style="margin-top: 30px; font-size: 11px; color: #666;">
            &copy; 2026 Tardeo House Station - By Mr. Postigo
        </div>
    </div>
</body>
</html>
