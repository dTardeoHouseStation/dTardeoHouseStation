<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a0f00;
            color: white;
            overflow-x: hidden;
        }

        /* FONDO QUE COMBINA TU IMAGEN Y EL DEGRADADO DEL LOGO */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(255, 62, 107, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* BARRA SUPERIOR (HEADER) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* MENÚ A LA IZQUIERDA */
        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-right: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            opacity: 0.7;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #ffaa00;
        }

        /* REPRODUCTOR A LA DERECHA (MINIMALISTA) */
        .player-right {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 170, 0, 0.3);
            max-height: 45px;
        }

        /* Ajuste del widget de Caster para que sea pequeño */
        .cstrEmbed {
            transform: scale(0.8); /* Reducimos el tamaño general */
            transform-origin: right center;
        }

        /* CONTENIDO CENTRAL (LOGO GRANDE) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo {
            max-width: 350px;
            width: 80%;
            filter: drop-shadow(0px 10px 30px rgba(0,0,0,0.8));
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        .view-more {
            margin-top: 30px;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            header { padding: 0 15px; }
            .nav-links li { margin-right: 15px; }
            .nav-links a { font-size: 0.6rem; }
            .main-logo { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <div class="nav-left">
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Artists</a></li>
            </ul>
        </div>

        <div class="player-right">
            <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="FFAA00" data-channelId="" data-rendered="false">
                </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
        <div class="view-more">Desliza para descubrir • Benalmádena</div>
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
