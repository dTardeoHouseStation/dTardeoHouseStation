<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(135deg, rgba(212, 63, 141, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0; width: 100%; height: 90px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* MENÚ IZQUIERDA */
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { margin-right: 20px; }
        .nav-links a {
            text-decoration: none; color: #fff; font-size: 0.7rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            opacity: 0.6; transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: #ffaa00; }

        /* CONTENEDOR DEL REPRODUCTOR (DERECHA) */
        .player-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 170, 0, 0.2);
            min-width: 200px; /* Espacio suficiente para que el widget respire */
            height: 50px;
            justify-content: center;
        }

        .live-tag {
            color: #ff3e3e; font-size: 8px; font-weight: 900;
            margin-right: 10px; animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* LOGO CENTRAL */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo {
            max-width: 380px; width: 80%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,0.9));
        }

        .location-tag {
            margin-top: 20px; font-size: 0.6rem; letter-spacing: 5px;
            text-transform: uppercase; color: #ffaa00; font-weight: 700; opacity: 0.8;
        }

        @media (max-width: 768px) {
            header { height: 120px; flex-direction: column; justify-content: space-around; padding: 10px; }
            .nav-links { margin-bottom: 10px; }
            .main-logo { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="player-box">
            <span class="live-tag">LIVE</span>
            
            <div class="cstrEmbed" 
                 data-type="newStreamPlayer" 
                 data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" 
                 data-theme="dark" 
                 data-color="FFAA00" 
                 data-channelId="" 
                 data-rendered="false">
                 
                <a href="https://www.caster.fm" style="display:none;">Radio Hosting</a> 
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
        <div class="location-tag">Benalmádena • Costa del Sol</div>
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
