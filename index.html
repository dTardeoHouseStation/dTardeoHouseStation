<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #111; /* Un gris muy oscuro en lugar de negro total */
            color: white;
            overflow-x: hidden;
        }

        /* FONDO DE MOSAICO CORREGIDO */
        .background-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('repeat.png');
            background-repeat: repeat;
            background-position: center;
            background-size: 400px; /* Tamaño del patrón ajustable */
            opacity: 0.3; /* Aumentamos un poco para que se vea, pero no tape */
            z-index: -1;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0; width: 100%; height: 90px;
            background: rgba(0, 0, 0, 0.85); /* Más sólido para que se vea el menú */
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 170, 0, 0.3);
            z-index: 1000;
        }

        .logo-img { height: 50px; }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a {
            text-decoration: none; color: #fff; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }

        /* REPRODUCTOR */
        .header-player {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .cstrEmbed { transform: scale(0.8); transform-origin: right center; }

        /* HERO */
        .main-content {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo-big { max-width: 350px; width: 80%; filter: drop-shadow(0 0 20px #000); }

        @media (max-width: 768px) {
            header { height: auto; padding: 15px; flex-direction: column; gap: 10px; }
            .nav-links { gap: 10px; }
            .main-logo-big { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="background-texture"></div>

    <header>
        <div class="header-logo">
            <img src="logo.png" alt="dTardeo" class="logo-img">
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="header-player">
            <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="6C2BDD" data-channelId="" data-rendered="false">
                <a href="https://www.caster.fm">Shoutcast Hosting</a> <a href="https://www.caster.fm">Stream Hosting</a> <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo-big">
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
