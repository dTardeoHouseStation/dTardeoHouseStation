<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000; /* Fondo de seguridad negro */
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* FONDO DE TEXTURA QUE SE REPITE (repeat.png) */
        .background-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('repeat.png'); /* La nueva textura de patrón */
            background-repeat: repeat; /* Se repite en mosaico */
            background-position: center;
            opacity: 0.15; /* Sutil para que no moleste */
            z-index: -2;
        }

        /* CAPA DE OSCURECIMIENTO (Para mejorar contraste) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* BARRA SUPERIOR (HEADER) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* LOGO ARRIBA A LA IZQUIERDA */
        .nav-logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        /* INTEGRACIÓN DEL NUEVO LOGO TRANSPARENTE */
        .nav-logo-image {
            height: 60px; /* Tamaño del logo en el menú */
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        .nav-logo-image:hover {
            transform: scale(1.05);
        }

        /* CONTENEDOR REPRODUCTOR ORIGINAL (DERECHA) */
        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        .live-tag {
            color: #ff3e3e;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Ajuste del widget oficial (Sin recortes para evitar errores) */
        .cstrEmbed {
            transform: scale(0.9);
            transform-origin: right center;
            min-width: 150px;
        }

        /* CONTENIDO PRINCIPAL (HERO) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .main-logo-big {
            max-width: 450px;
            width: 90%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,0.9));
        }

        .location-tag {
            margin-top: 30px;
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffaa00;
            font-weight: 700;
            opacity: 0.8;
        }

        /* RESPONSIVE PARA MÓVILES */
        @media (max-width: 768px) {
            header { padding: 0 20px; height: 130px; flex-direction: column; justify-content: space-around; }
            .nav-logo-image { height: 40px; }
            .player-wrapper { padding: 5px 10px; width: 100%; justify-content: center; }
            .cstrEmbed { transform: scale(0.85); }
        }
    </style>
</head>
<body>

    <div class="background-texture"></div>
    <div class="overlay"></div>

    <header>
        <a href="#home" class="nav-logo-container">
            <img src="logo.png" alt="dTardeo Logo Transparente" class="nav-logo-image">
        </a>

        <div class="player-wrapper">
            <span class="live-tag">ON AIR</span>
            
            <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="6C2BDD" data-channelId="" data-rendered="false">
                <a href="https://www.caster.fm">Shoutcast Hosting</a> 
                <a href="https://www.caster.fm">Stream Hosting</a> 
                <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
        </div>
    </header>

    <main class="hero" id="home">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo-big">
        <div class="location-tag">Benalmádena • Costa del Sol</div>
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
