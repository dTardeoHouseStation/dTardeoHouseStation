<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* FONDO COMBINADO CON TU IMAGEN */
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(135deg, rgba(212, 63, 141, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* BARRA SUPERIOR */
        header {
            position: fixed;
            top: 0; width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* MENÚ IZQUIERDA */
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-right: 25px; }
        .nav-links a {
            text-decoration: none; color: #fff; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; opacity: 0.6;
        }
        .nav-links a:hover { opacity: 1; color: #ffaa00; }

        /* CONTENEDOR REPRODUCTOR (DERECHA) */
        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        .live-tag {
            color: #ff3e3e; font-size: 9px; font-weight: 900;
            letter-spacing: 1px; animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Ajuste visual del widget oficial */
        .cstrEmbed {
            transform: scale(0.9);
            transform-origin: right center;
        }

        /* Ocultación elegante de los links obligatorios */
        .cstrEmbed a {
            font-size: 1px;
            color: rgba(0,0,0,0.1);
            text-decoration: none;
            pointer-events: none;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo {
            max-width: 400px; width: 85%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,0.9));
        }

        @media (max-width: 768px) {
            header { padding: 0 20px; }
            .nav-links { display: none; }
            .main-logo { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="player-wrapper">
            <span class="live-tag">ON AIR</span>
            
            <div class="cstrEmbed" 
                 data-type="newStreamPlayer" 
                 data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" 
                 data-theme="dark" 
                 data-color="FFAA00" 
                 data-channelId="" 
                 data-rendered="false">
                 
                <a href="https://www.caster.fm">Radio Hosting</a>
                <a href="https://www.caster.fm">Shoutcast Hosting</a>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
