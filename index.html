<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeoHouseStation | Premium Radio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita scroll innecesario */
        }

        /* Contenedor del fondo con la imagen que me has pasado */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.7); /* Oscurece un poco para que resalte el reproductor */
            z-index: -1;
        }

        /* Capa de degradado estilo Ibiza Live Radio */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo-container img {
            max-width: 300px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5));
        }

        /* Estilo para el contenedor del reproductor de Caster.fm */
        .player-wrapper {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Efecto cristal traslúcido */
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .live-tag {
            color: #6C2BDD;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
            text-transform: uppercase;
        }

        footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div class="gradient-overlay"></div>

    <div class="main-container">
        
        <div class="player-wrapper">
            <span class="live-tag">Live from the Beach</span>
            
            <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="6C2BDD" data-channelId="" data-rendered="false">
                <a href="https://www.caster.fm">Shoutcast Hosting</a> 
                <a href="https://www.caster.fm">Stream Hosting</a> 
                <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
            <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>
            
        </div>

        <footer>
            &copy; 2026 dTardeoHouseStation | All Rights Reserved
        </footer>
    </div>
<script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

    <script>
        window.addEventListener('load', function() {
            // Esperamos un momento para asegurarnos de que el widget de Caster.fm se ha cargado
            setTimeout(function() {
                // Buscamos el elemento de audio que crea el widget de Caster.fm
                var cstrPlayer = document.querySelector('.cstrEmbed audio');
                
                if (cstrPlayer) {
                    // Intentamos reproducir
                    var playPromise = cstrPlayer.play();

                    // Manejamos la promesa (necesario para navegadores modernos)
                    if (playPromise !== undefined) {
                        playPromise.then(_ => {
                            // Autoplay exitoso
                            console.log("Autoplay exitoso.");
                        }).catch(error => {
                            // Autoplay bloqueado por el navegador
                            console.log("El navegador bloqueó el autoplay. Se requiere interacción del usuario.");
                            // Aquí podrías mostrar un mensaje al usuario: "Haz clic en Play para escuchar".
                        });
                    }
                }
            }, 2000); // Espera 2 segundos (ajustar si es necesario)
        });
    </script>
</body>
</html>
</body>
</html>
