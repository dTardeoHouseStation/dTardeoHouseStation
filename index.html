<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* FONDO CON TU IMAGEN ORIGINAL */
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(135deg, rgba(212, 63, 141, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* BARRA SUPERIOR */
        header {
            position: fixed;
            top: 0; width: 100%; height: 90px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* MENÚ IZQUIERDA */
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-right: 25px; }
        .nav-links a {
            text-decoration: none; color: #fff; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; opacity: 0.6;
        }
        .nav-links a:hover { opacity: 1; color: #ffaa00; }

        /* CONTENEDOR REPRODUCTOR (DERECHA) */
        .player-container {
            display: flex;
            align-items: center;
            gap: 15px;
            /* No forzamos tamaños pequeños para evitar errores del script */
        }

        .live-tag {
            color: #ff3e3e; font-size: 9px; font-weight: 900;
            letter-spacing: 1px; animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* LOGO CENTRAL */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo {
            max-width: 400px; width: 85%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,0.9));
        }

        @media (max-width: 768px) {
            header { height: auto; padding: 20px; flex-direction: column; gap: 15px; }
            .nav-links { display: none; }
            .main-logo { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Artists</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="player-container">
            <span class="live-tag">ON AIR</span>
            
            <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="6C2BDD" data-channelId="" data-rendered="false">
                <a href="https://www.caster.fm">Shoutcast Hosting</a> 
                <a href="https://www.caster.fm">Stream Hosting</a> 
                <a href="https://www.caster.fm">Radio Server Hosting</a>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
