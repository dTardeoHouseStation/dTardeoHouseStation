<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        /* FONDO DE TEXTURA REPETIDA */
        .background-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('repeat.png');
            background-repeat: repeat;
            background-size: 300px; /* Tamaño del patrón */
            opacity: 0.2;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* HEADER REDISEÑADO: LOGO + MENÚ A LA IZQUIERDA */
        header {
            position: fixed;
            top: 0; width: 100%; height: 90px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 40px; /* Espacio entre logo y enlaces */
        }

        .nav-logo-image {
            height: 55px;
            transition: 0.3s;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-links a:hover { opacity: 1; color: #ffaa00; }

        /* REPRODUCTOR A LA DERECHA */
        .header-right {
            display: flex;
            align-items: center;
        }

        .player-wrapper {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 170, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cstrEmbed {
            transform: scale(0.85);
            transform-origin: right center;
        }

        /* HERO CENTRAL */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .main-logo-big {
            max-width: 420px;
            width: 80%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,1));
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            header { padding: 0 15px; }
            .header-left { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="background-texture"></div>
    <div class="overlay"></div>

    <header>
        <div class="header-left">
            <a href="#">
                <img src="logo.png" alt="dTardeo Logo" class="nav-logo-image">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Schedule</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>

        <div class="header-right">
            <div class="player-wrapper">
                <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" data-theme="dark" data-color="6C2BDD" data-channelId="" data-rendered="false">
                    <a href="https://www.caster.fm">Radio Hosting</a>
                </div>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo-big">
        <p style="margin-top:20px; letter-spacing: 5px; font-size: 10px; opacity: 0.5;">PREMIUM HOUSE MUSIC • BENALMÁDENA</p>
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
