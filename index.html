<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dTardeo House Station | Sunset Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #1a0f00;
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* FONDO COMBINADO: TU IMAGEN + DEGRADADO DEL LOGO */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(212, 63, 141, 0.4) 0%, rgba(255, 140, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('fondo.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* BARRA SUPERIOR (HEADER) ESTILO IBIZA */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* MENÚ A LA IZQUIERDA */
        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-right: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            opacity: 0.6;
        }

        .nav-links a:hover {
            opacity: 1;
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        /* REPRODUCTOR A LA DERECHA (CORRECCIÓN LINKS) */
        .player-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        .live-tag {
            color: #ff3e3e;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1px;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Ajuste visual del widget para que sea pequeño */
        .cstrEmbed {
            transform: scale(0.85);
            transform-origin: right center;
        }

        /* LOGO CENTRAL (HERO) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .main-logo {
            max-width: 400px;
            width: 85%;
            filter: drop-shadow(0px 15px 40px rgba(0,0,0,0.9));
            animation: pulse 5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .location-tag {
            margin-top: 25px;
            font-size: 0.65rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffaa00;
            font-weight: 700;
            opacity: 0.8;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            header { padding: 0 20px; height: 70px; }
            .nav-links { display: none; } /* En móvil el menú se simplifica */
            .main-logo { max-width: 280px; }
            .player-container { padding: 5px 10px; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Artists</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <div class="player-container">
            <span class="live-tag">ON AIR</span>
            
            <div class="cstrEmbed" 
                 data-type="newStreamPlayer" 
                 data-publicToken="1f51f40c-d821-4ec5-9f7d-18e5384f69be" 
                 data-theme="dark" 
                 data-color="FFAA00" 
                 data-channelId="" 
                 data-rendered="false">
                 
                <a href="https://www.caster.fm" style="display:none;">Shoutcast Hosting</a> 
                <a href="https://www.caster.fm" style="display:none;">Stream Hosting</a> 
                <a href="https://www.caster.fm" style="display:none;">Radio Server Hosting</a>
            </div>
        </div>
    </header>

    <main class="hero">
        <img src="logo.png" alt="dTardeo House Station" class="main-logo">
        <div class="location-tag">Benalmádena • Costa del Sol</div>
    </main>

    <script src="//cdn.cloud.caster.fm//widgets/embed.js"></script>

</body>
</html>
